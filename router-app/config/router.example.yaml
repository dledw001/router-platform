hostname: router-dev

interfaces:
  wan:
    device: enp3s0
    dhcp4: true
  lan:
    device: enp4s0
    address: 192.168.50.1/24
    subnet: 192.168.50.0/24

routing:
  ipv4_forward: true

nat:
  enabled: true
  outbound_interface: wan
  masquerade: true

dhcp:
  enabled: true
  interface: lan
  lease_time: 5m
  pool:
    start: 192.168.50.100
    end: 192.168.50.199
  router: 192.168.50.1
